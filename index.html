<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expression Voice Feedback</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; background: #1a1a1a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #container { position: relative; margin-top: 20px; border: 4px solid #444; border-radius: 15px; overflow: hidden; line-height: 0; }
        video { background: #000; }
        #status { margin-top: 20px; font-size: 1.5rem; font-weight: bold; color: #00d4ff; }
        .hint { color: #888; font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>AI Mood Voice (Powered By Muhammad Waris Anjum)</h2>
    <div id="container">
        <video id="video" width="640" height="480" autoplay muted></video>
    </div>
    <div id="status">Initializing...</div>
    <p class="hint">Click the page once the video starts to enable audio!</p>

    <script>
        const video = document.getElementById('video');
        const status = document.getElementById('status');
        let lastExpression = "";

        async function init() {
            // Check if faceapi is actually loaded
            if (typeof faceapi === 'undefined') {
                status.innerText = "Error: Library not loaded. Check internet connection.";
                return;
            }

            status.innerText = "Loading AI Models...";
            
            // Load models from the public weights mirror
            const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
            
            try {
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                await faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL);
                startVideo();
            } catch (err) {
                status.innerText = "Model load failed.";
                console.error(err);
            }
        }

        function startVideo() {
            navigator.mediaDevices.getUserMedia({ video: {} })
                .then(stream => {
                    video.srcObject = stream;
                    status.innerText = "Ready! Smile or look sad.";
                })
                .catch(err => {
                    status.innerText = "Camera access denied.";
                });
        }

        function speak(text) {
            // Cancel current speech so it doesn't overlap
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            
            // Adjust pitch/rate for the "sad" effect
            if (text.includes("Nooo")) {
                utterance.pitch = 0.5; 
                utterance.rate = 0.8;
            } else {
                utterance.pitch = 1.2;
                utterance.rate = 1.1;
            }
            
            window.speechSynthesis.speak(utterance);
        }

        video.addEventListener('play', () => {
            setInterval(async () => {
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions()).withFaceExpressions();
                
                if (detections.length > 0) {
                    const expressions = detections[0].expressions;
                    // Filter for the highest confidence emotion
                    const emotion = Object.keys(expressions).reduce((a, b) => expressions[a] > expressions[b] ? a : b);

                    if (emotion !== lastExpression) {
                        if (emotion === "happy") {
                            status.innerText = "DETECTED: HAPPY 😊";
                            speak("Hahaha! You look great!");
                        } else if (emotion === "sad") {
                            status.innerText = "DETECTED: SAD 😢";
                            speak("Nooo, don't be sad.");
                        }
                        lastExpression = emotion;
                    }
                }
            }, 600); // Check slightly faster for better responsiveness
        });

        // Start the process when the window is ready
        window.onload = init;
    </script>
</body>
</html>
